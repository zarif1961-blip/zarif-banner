<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translate</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: transparent;
  overflow: visible;
  padding: 5px 8px;
}

.widget {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #ffffff 0%, #f0f5ff 100%);
  border: 1.5px solid #b8ccec;
  border-radius: 10px;
  padding: 5px 10px;
  box-shadow: 0 2px 12px rgba(0,50,150,0.12);
}

/* Globe icon */
.globe {
  width: 22px; height: 22px;
  flex-shrink: 0;
  background: #1a73e8;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: bold;
}

/* Dropdown wrapper */
.dd-wrap { position: relative; z-index: 1000; }

/* Selected box */
.dd-box {
  display: flex; align-items: center; gap: 6px;
  background: #fff;
  border: 1.5px solid #b8ccec;
  border-radius: 7px;
  padding: 4px 26px 4px 8px;
  cursor: pointer;
  min-width: 180px;
  font-size: 13px; color: #1a2a4a;
  position: relative;
  white-space: nowrap; overflow: hidden;
  transition: border-color .15s;
  user-select: none;
}
.dd-box:hover { border-color: #1a73e8; }

/* Flag inside box */
.dd-box .flag-img {
  width: 22px; height: 15px;
  object-fit: cover;
  border-radius: 2px;
  border: 1px solid #ddd;
  flex-shrink: 0;
  display: inline-block;
}
.dd-box .flag-fb {
  width: 22px; height: 15px;
  border-radius: 2px;
  background: #1a73e8;
  color: #fff;
  font-size: 8px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; text-transform: uppercase;
  letter-spacing: -0.5px;
}

.arrow {
  position: absolute; right: 7px; top: 50%;
  transform: translateY(-50%);
  color: #7090bb; font-size: 9px; pointer-events: none;
}

/* Dropdown list */
.dd-list {
  display: none;
  position: absolute;
  top: calc(100% + 4px); left: 0;
  background: #fff;
  border: 1.5px solid #b8ccec;
  border-radius: 8px;
  box-shadow: 0 8px 28px rgba(0,40,120,0.18);
  max-height: 320px; overflow-y: auto;
  min-width: 230px; z-index: 9999;
}
.dd-list.open { display: block; }

/* Search */
.search-box {
  padding: 8px 10px 6px;
  border-bottom: 1px solid #e5eaf5;
  position: sticky; top: 0;
  background: #fff; z-index: 5;
}
.search-box input {
  width: 100%;
  border: 1.5px solid #b8ccec;
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 12.5px; outline: none;
  font-family: inherit; color: #1a2a4a;
}
.search-box input:focus { border-color: #1a73e8; }

/* Option row */
.opt {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 13px;
  font-size: 13px; color: #1a2a4a;
  cursor: pointer;
  white-space: nowrap;
  transition: background .1s;
}
.opt:hover { background: #eef4fc; }
.opt.active { background: #dce8fb; font-weight: 600; }
.opt.hidden { display: none; }

.opt .flag-img {
  width: 22px; height: 15px;
  object-fit: cover;
  border-radius: 2px;
  border: 1px solid #ddd;
  flex-shrink: 0;
}
.opt .flag-fb {
  width: 22px; height: 15px;
  border-radius: 2px;
  background: #1a73e8;
  color: #fff;
  font-size: 8px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; text-transform: uppercase;
  letter-spacing: -0.5px;
}

/* Divider */
.sep { width:1px; height:22px; background:#c0d0e8; flex-shrink:0; }

/* Button */
.btn {
  background: linear-gradient(135deg, #1a73e8 0%, #0c57c8 100%);
  color: #fff; border: none; border-radius: 7px;
  padding: 6px 15px; font-size: 13px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  box-shadow: 0 1px 6px rgba(26,115,232,.4);
  transition: all .15s; flex-shrink: 0;
}
.btn:hover {
  background: linear-gradient(135deg, #1558c0 0%, #0945a8 100%);
  box-shadow: 0 3px 12px rgba(26,115,232,.45);
  transform: translateY(-1px);
}
.btn:active { transform: translateY(0); }

#err {
  font-size: 11px; color: #c0392b;
  display: none; margin-left: 2px;
}

/* Scrollbar */
.dd-list::-webkit-scrollbar { width: 5px; }
.dd-list::-webkit-scrollbar-track { background: #f0f4fb; }
.dd-list::-webkit-scrollbar-thumb { background: #b8ccec; border-radius: 5px; }
</style>
</head>
<body>

<div class="widget">

  <!-- Globe icon -->
  <div class="globe">&#9679;</div>

  <!-- Dropdown -->
  <div class="dd-wrap" id="ddWrap">

    <div class="dd-box" id="ddBox" onclick="toggleDD()">
      <img class="flag-img" id="selImg"
           src="https://flagcdn.com/w40/gb.png"
           onerror="this.style.display='none'; document.getElementById('selFb').style.display='inline-flex';"
           alt="" style="display:none;">
      <span class="flag-fb" id="selFb" style="display:none;">EN</span>
      <span id="selTxt">&#8212; Select language &#8212;</span>
      <span class="arrow">&#9660;</span>
    </div>

    <div class="dd-list" id="ddList">
      <div class="search-box">
        <input id="ddSearch" type="text"
               placeholder="Search language..."
               oninput="filterOpts(this.value)">
      </div>
      <!-- options built by JS -->
    </div>
  </div>

  <div class="sep"></div>
  <button class="btn" onclick="doTranslate()">Translate</button>
  <span id="err">&#9888; Select language</span>
</div>

<script>
// ══════════════════════════════════════════════════════
// Languages supported by Yandex Translate (website mode)
// Format: [yandexCode, flagCountryCode, displayName]
// ══════════════════════════════════════════════════════
var LANGS = [
  ["af","za","Afrikaans"],
  ["sq","al","Albanian"],
  ["am","et","Amharic"],
  ["ar","sa","Arabic"],
  ["hy","am","Armenian"],
  ["az","az","Azerbaijani"],
  ["eu","es","Basque"],
  ["be","by","Belarusian"],
  ["bn","bd","Bengali"],
  ["bs","ba","Bosnian"],
  ["bg","bg","Bulgarian"],
  ["ca","es","Catalan"],
  ["ceb","ph","Cebuano"],
  ["zh","cn","Chinese (Simplified)"],
  ["hr","hr","Croatian"],
  ["cs","cz","Czech"],
  ["da","dk","Danish"],
  ["nl","nl","Dutch"],
  ["en","gb","English"],
  ["eo","un","Esperanto"],
  ["et","ee","Estonian"],
  ["fi","fi","Finnish"],
  ["fr","fr","French"],
  ["gl","es","Galician"],
  ["ka","ge","Georgian"],
  ["de","de","German"],
  ["el","gr","Greek"],
  ["gu","in","Gujarati"],
  ["ht","ht","Haitian Creole"],
  ["he","il","Hebrew"],
  ["hi","in","Hindi"],
  ["hu","hu","Hungarian"],
  ["is","is","Icelandic"],
  ["id","id","Indonesian"],
  ["ga","ie","Irish"],
  ["it","it","Italian"],
  ["ja","jp","Japanese"],
  ["jv","id","Javanese"],
  ["kn","in","Kannada"],
  ["kk","kz","Kazakh"],
  ["km","kh","Khmer"],
  ["ko","kr","Korean"],
  ["ky","kg","Kyrgyz"],
  ["lo","la","Lao"],
  ["lv","lv","Latvian"],
  ["lt","lt","Lithuanian"],
  ["mk","mk","Macedonian"],
  ["mg","mg","Malagasy"],
  ["ms","my","Malay"],
  ["ml","in","Malayalam"],
  ["mt","mt","Maltese"],
  ["mi","nz","Maori"],
  ["mr","in","Marathi"],
  ["mn","mn","Mongolian"],
  ["ne","np","Nepali"],
  ["no","no","Norwegian"],
  ["fa","ir","Persian"],
  ["pl","pl","Polish"],
  ["pt","pt","Portuguese"],
  ["pa","in","Punjabi"],
  ["ro","ro","Romanian"],
  ["ru","ru","Russian"],
  ["sr","rs","Serbian"],
  ["si","lk","Sinhala"],
  ["sk","sk","Slovak"],
  ["sl","si","Slovenian"],
  ["so","so","Somali"],
  ["es","es","Spanish"],
  ["sw","ke","Swahili"],
  ["sv","se","Swedish"],
  ["tl","ph","Tagalog"],
  ["tg","tj","Tajik"],
  ["ta","in","Tamil"],
  ["te","in","Telugu"],
  ["th","th","Thai"],
  ["tr","tr","Turkish"],
  ["tk","tm","Turkmen"],
  ["uk","ua","Ukrainian"],
  ["ur","pk","Urdu"],
  ["uz","uz","Uzbek"],
  ["vi","vn","Vietnamese"],
  ["cy","gb","Welsh"],
  ["xh","za","Xhosa"],
  ["yi","il","Yiddish"],
  ["yo","ng","Yoruba"],
  ["zu","za","Zulu"]
];

var curLang = null;
var ddOpen  = false;

// ── Build options ──────────────────────────────────
function buildOpts() {
  var list = document.getElementById('ddList');
  LANGS.forEach(function(row) {
    var code = row[0], flag = row[1], name = row[2];

    var div = document.createElement('div');
    div.className = 'opt';
    div.dataset.code = code;
    div.dataset.flag = flag;
    div.dataset.name = name.toLowerCase();

    // Flag image with colored-box fallback
    var img = document.createElement('img');
    img.className = 'flag-img';
    img.src = 'https://flagcdn.com/w40/' + flag + '.png';
    img.alt  = flag;
    img.setAttribute('loading','lazy');

    var fb  = document.createElement('span');
    fb.className = 'flag-fb';
    fb.textContent = flag.toUpperCase().substring(0,2);
    fb.style.display = 'none';

    img.onerror = function() {
      img.style.display = 'none';
      fb.style.display  = 'inline-flex';
    };

    var lbl = document.createElement('span');
    lbl.textContent = name;

    div.appendChild(img);
    div.appendChild(fb);
    div.appendChild(lbl);
    div.onclick = function() { pick(code, flag, name); };
    list.appendChild(div);
  });
}

// ── Pick a language ────────────────────────────────
function pick(code, flag, name) {
  curLang = code;

  // Update selected box
  var si = document.getElementById('selImg');
  var sf = document.getElementById('selFb');
  si.src = 'https://flagcdn.com/w40/' + flag + '.png';
  si.style.display = 'inline-block';
  sf.style.display = 'none';
  si.onerror = function() {
    si.style.display = 'none';
    sf.textContent   = flag.toUpperCase().substring(0,2);
    sf.style.display = 'inline-flex';
  };

  document.getElementById('selTxt').textContent = name;
  document.getElementById('err').style.display  = 'none';

  document.querySelectorAll('.opt').forEach(function(el) {
    el.classList.toggle('active', el.dataset.code === code);
  });
  closeDD();
}

// ── Dropdown open/close ────────────────────────────
function toggleDD() { ddOpen ? closeDD() : openDD(); }

function openDD() {
  ddOpen = true;
  document.getElementById('ddList').classList.add('open');
  document.getElementById('ddSearch').value = '';
  filterOpts('');
  setTimeout(function(){ document.getElementById('ddSearch').focus(); }, 60);
}

function closeDD() {
  ddOpen = false;
  document.getElementById('ddList').classList.remove('open');
}

document.addEventListener('click', function(e) {
  if (ddOpen && !document.getElementById('ddWrap').contains(e.target)) closeDD();
});

// ── Filter ─────────────────────────────────────────
function filterOpts(q) {
  q = (q||'').toLowerCase().trim();
  document.querySelectorAll('.opt').forEach(function(el) {
    el.classList.toggle('hidden', !!q && el.dataset.name.indexOf(q) === -1);
  });
}

// ══════════════════════════════════════════════════
// TRANSLATE via Yandex Translate
// (works in Uzbekistan — no translate.goog needed)
// URL format:
//   https://translate.yandex.com/translate?url=PAGE&lang=en-LANG
// ══════════════════════════════════════════════════
function doTranslate() {
  if (!curLang) {
    document.getElementById('err').style.display = 'inline';
    return;
  }

  // Detect current page URL from referrer
  var pageUrl = document.referrer || 'https://www.zarif.uz/';
  if (!pageUrl || pageUrl.indexOf('zarif.uz') === -1) {
    pageUrl = 'https://www.zarif.uz/';
  }
  // Strip any previous Yandex wrapping
  if (pageUrl.indexOf('translate.yandex') !== -1) {
    pageUrl = 'https://www.zarif.uz/';
  }

  var targetUrl =
    'https://translate.yandex.com/translate' +
    '?url='  + encodeURIComponent(pageUrl) +
    '&lang=en-' + encodeURIComponent(curLang);

  try { window.top.location.href = targetUrl; }
  catch(e) { window.location.href = targetUrl; }
}

// ── Init ──────────────────────────────────────────
buildOpts();
</script>
</body>
</html>
