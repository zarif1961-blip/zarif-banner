<title>Zarif Translate Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 6px 12px;
    min-height: 52px;
    overflow: hidden;
  }

  .widget {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.97);
    border: 1px solid #d0d7e3;
    border-radius: 10px;
    padding: 6px 10px;
    box-shadow: 0 2px 12px rgba(0,60,120,0.10), 0 1px 3px rgba(0,0,0,0.07);
    backdrop-filter: blur(8px);
  }

  .globe-icon {
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
    user-select: none;
  }

  .select-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  select {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 13.5px;
    color: #1a2a4a;
    cursor: pointer;
    padding-right: 20px;
    min-width: 160px;
    max-width: 200px;
    line-height: 1.4;
  }

  select option {
    font-size: 13px;
    color: #1a2a4a;
    background: #fff;
  }

  .chevron {
    position: absolute;
    right: 2px;
    pointer-events: none;
    color: #5578a0;
    font-size: 10px;
  }

  .divider {
    width: 1px;
    height: 22px;
    background: #d0d7e3;
    flex-shrink: 0;
  }

  .btn {
    background: linear-gradient(135deg, #1a73e8 0%, #0d5bd1 100%);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.18s ease;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(26,115,232,0.35);
    flex-shrink: 0;
  }

  .btn:hover {
    background: linear-gradient(135deg, #1765cc 0%, #0b4fba 100%);
    box-shadow: 0 2px 8px rgba(26,115,232,0.45);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
    box-shadow: 0 1px 3px rgba(26,115,232,0.3);
  }

  .btn:disabled {
    background: #b0c4de;
    box-shadow: none;
    cursor: default;
    transform: none;
  }

  #msg {
    font-size: 11.5px;
    color: #c0392b;
    display: none;
    margin-left: 4px;
    white-space: nowrap;
  }
</style>

<script>
  // Base site URL — update this if your domain ever changes
  var SITE_BASE = 'https://www.zarif.uz/';

  function clearMsg() {
    document.getElementById('msg').style.display = 'none';
  }

  function doTranslate() {
    var lang = document.getElementById('langSelect').value;
    if (!lang) {
      document.getElementById('msg').style.display = 'inline';
      return;
    }

    // Try to get the real current page URL from the parent window
    // document.referrer is readable cross-origin (unlike window.parent.location)
    var pageUrl = document.referrer || SITE_BASE;

    // If referrer is empty or isn't our site, use the base URL
    if (!pageUrl || pageUrl.indexOf('zarif.uz') === -1) {
      pageUrl = SITE_BASE;
    }

    // Remove any existing Google Translate wrapping if user is already on translated version
    if (pageUrl.indexOf('translate.google') !== -1 || pageUrl.indexOf('translate.goog') !== -1) {
      // Try to extract the original URL from Google's proxy URL
      var match = pageUrl.match(/[?&]u=([^&]+)/);
      if (match) {
        pageUrl = decodeURIComponent(match[1]);
      } else {
        pageUrl = SITE_BASE;
      }
    }

    var translateUrl =
      'https://translate.google.com/translate?sl=en&tl=' +
      encodeURIComponent(lang) +
      '&u=' +
      encodeURIComponent(pageUrl);

    // Navigate the top-level window (works cross-origin for navigation)
    try {
      window.top.location.href = translateUrl;
    } catch (e) {
      // Fallback: open in same tab
      window.location.href = translateUrl;
    }
  }

  // Allow pressing Enter in the select to trigger translation
  document.getElementById('langSelect').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doTranslate();
  });
</script>
